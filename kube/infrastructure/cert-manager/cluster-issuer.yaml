apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: letsencrypt

spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ynoacamino@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key

    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secrets
              key: api-token

        selector: {}
