apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: prod
  labels:
    app: worker
    app.kubernetes.io/part-of: microphoto
spec:
  replicas: 4
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/christianmz565/microphoto/worker:9ccdcea
          envFrom:
            - secretRef:
                name: microphoto-secrets
            - configMapRef:
                name: microphoto-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
