global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "coordinator"
    static_configs:
      - targets: ["coordinator:9090"]
    metrics_path: /metrics

  - job_name: "worker"
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /metrics

  - job_name: "reaper"
    static_configs:
      - targets: ["reaper:9092"]
    metrics_path: /metrics
