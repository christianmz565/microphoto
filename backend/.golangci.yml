version: "2"
run:
  concurrency: 4
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    - gocritic
    - revive
    - wsl_v5
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    - gocyclo
    - nestif
    - funlen
    - dupl
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    - sqlclosecheck
    - rowserrcheck
    - sloglint
    - loggercheck
    - testifylint
    - thelper
    - usetesting
    - paralleltest
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint

  exclusions:
    paths:
      - vendor$
      - third_party$
      - testutils$
      - examples$

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close
        - (os.File).Close
    funlen:
      lines: 150
      statements: 100
    goconst:
      min-len: 3
      min-occurrences: 5
    gocyclo:
      min-complexity: 20
    nolintlint:
      require-explanation: true
      require-specific: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 3

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
