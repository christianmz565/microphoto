name: Build Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: coordinator
            context: ./backend
            target: coordinator
            dockerfile: ./backend/Dockerfile
          - name: reaper
            context: ./backend
            target: reaper
            dockerfile: ./backend/Dockerfile
          - name: worker
            context: ./backend
            target: worker
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            target: runtime
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.name }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.name }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          load: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Save image as artifact
        run: |
          docker save \
            "${{ steps.tags.outputs.sha_tag }}" \
            "${{ steps.tags.outputs.latest_tag }}" \
            | gzip > "${{ matrix.name }}.tar.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz
          retention-days: 7
          compression-level: 0
